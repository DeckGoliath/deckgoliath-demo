<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bannière Facebook — Deck Goliath</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@1,400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }

  .banniere {
    width: 1200px;
    height: 445px;
    position: relative;
    overflow: hidden;
    background: #0A0806;
  }

  .bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 90% at 70% 50%, rgba(70,45,8,0.5) 0%, transparent 65%),
      #0A0806;
  }

  /* Aigle DERRIÈRE les 3 mots — côté droit */
  .eagle {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-48%);
    height: 380px;
    width: auto;
    opacity: 0.22;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 1;
  }

  /* ── LIGNE 1 : Téléphone + Slogan centré ── */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 38px;
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(201,150,42,0.25);
    display: flex;
    align-items: center;
    padding: 0 28px;
    z-index: 3;
  }
  .top-phone {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(201,150,42,0.9);
    letter-spacing: 1px;
    white-space: nowrap;
    flex-shrink: 0;
    width: 160px;
  }
  .top-slogan {
    flex: 1;
    text-align: center;
    font-family: 'EB Garamond', serif;
    font-size: 17px;
    font-style: italic;
    color: rgba(240,234,214,0.75);
    letter-spacing: 0.5px;
  }
  .top-spacer { width: 160px; flex-shrink: 0; }

  /* ── LIGNE 2 : Badge + Logo + 3 mots ── */
  .middle {
    position: absolute;
    top: 38px;
    left: 0; right: 0;
    bottom: 62px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    z-index: 2;
  }
  .badge-img {
    height: 150px;
    width: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 0 14px rgba(201,150,42,0.5));
    z-index: 3;
  }
  .logo-img {
    height: 155px;
    width: auto;
    flex-shrink: 0;
    filter: drop-shadow(0 0 15px rgba(201,150,42,0.3));
    z-index: 3;
  }
  .divider-v {
    width: 1px;
    height: 110px;
    background: linear-gradient(to bottom, transparent, rgba(201,150,42,0.6), transparent);
    flex-shrink: 0;
    z-index: 3;
  }
  /* Zone 3 mots avec aigle derrière */
  .mots-zone {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    height: 100%;
  }
  .trois-mots {
    position: relative;
    z-index: 3;
    font-family: 'Cinzel', serif;
    font-size: 58px;
    font-weight: 700;
    line-height: 1.0;
    color: #F0EAD6;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .trois-mots .gold { color: #E8B84B; }

  /* ── LIGNE 3 : Fabriquants ── */
  .fab-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 62px;
    background: rgba(20,16,10,0.92);
    border-top: 1px solid rgba(201,150,42,0.2);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 28px;
    z-index: 3;
  }
  .fab-bar img {
    height: 38px;
    width: auto;
    max-width: 150px;
    object-fit: contain;
    opacity: 0.85;
    filter: grayscale(10%) brightness(0.9);
  }
  .fab-fallback {
    font-family: 'Cinzel', sans-serif;
    font-size: 10px;
    color: rgba(201,150,42,0.7);
    letter-spacing: 1px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="banniere">
  <div class="bg"></div>

  <!-- Aigle derrière les 3 mots -->
  <img src="assets/eagle-line.png" class="eagle" alt="" onerror="this.style.display='none'">

  <!-- LIGNE 1 -->
  <div class="top-bar">
    <span class="top-phone">📞 819-484-7851</span>
    <span class="top-slogan">Vos besoins, vos rêves, notre spécialité!</span>
    <span class="top-spacer"></span>
  </div>

  <!-- LIGNE 2 -->
  <div class="middle">
    <img src="assets/choix-president.png" class="badge-img" alt="Choix du consommateur 2026" onerror="this.style.display='none'">
    <img src="assets/logo.png" class="logo-img" alt="Deck Goliath" onerror="this.style.display='none'">
    <div class="divider-v"></div>
    <div class="mots-zone">
      <div class="trois-mots">
        Minimaliste.<br>
        <span class="gold">Luxueux.</span><br>
        Inébranlable.
      </div>
    </div>
  </div>

  <!-- LIGNE 3 — Google en dernier -->
  <div class="fab-bar">
    <img src="assets/fabriquant1.png" alt="Deckorators"  onerror="this.outerHTML='<span class=fab-fallback>Deckorators</span>'">
    <img src="assets/fabriquant2.png" alt="TimberTech"   onerror="this.outerHTML='<span class=fab-fallback>TimberTech</span>'">
    <img src="assets/fabriquant4.png" alt="Regal Ideas"  onerror="this.outerHTML='<span class=fab-fallback>Regal Ideas</span>'">
    <img src="assets/fabriquant5.png" alt="DeckStars"    onerror="this.outerHTML='<span class=fab-fallback>DeckStars</span>'">
    <img src="assets/fabriquant6.png" alt="Choix conso"  onerror="this.outerHTML='<span class=fab-fallback>Choix du consommateur</span>'">
    <img src="assets/fabriquant3.png" alt="Google 5★"    onerror="this.outerHTML='<span class=fab-fallback>Google ★★★★★ 5.0</span>'">
  </div>

</div>
</body>
</html>
